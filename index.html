          "name": "What is Keon Wallet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Keon Wallet is a non-custodial Starknet wallet available as a Chrome browser extension and Android mobile app. It supports token swaps, WalletConnect, a built-in dApp browser, and transaction simulation."

        {
          "@type": "Question",
          "name": "Is Keon Wallet free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Keon Wallet is completely free to download and use. There are no subscription fees. Standard Starknet network fees apply for transactions."
          }
        },
        {
          "@type": "Question",
          "name": "Does Keon Wallet support WalletConnect?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Keon Wallet fully supports WalletConnect v2 protocol, allowing you to connect to any Starknet dApp that supports WalletConnect by scanning a QR code or using a deep link."
          }
        },
        {
          "@type": "Question",
          "name": "Is Keon Wallet non-custodial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Keon Wallet is fully non-custodial. Your private keys and seed phrase are encrypted and stored locally on your device. They never leave your device or are transmitted to any server."
          }
        },
        {
          "@type": "Question",
          "name": "What networks does Keon Wallet support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Keon Wallet supports Starknet Mainnet and Starknet Sepolia testnet. You can switch between networks in the wallet settings."
          }
        }
      ]
    }
